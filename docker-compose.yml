services:
  # ==============================================
  # MySQL Database
  # ==============================================
  mysql:
    image: mysql:8.0
    container_name: adaptive_db_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-adaptive_db}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================
  # MongoDB Database
  # ==============================================
  mongodb:
    image: mongo:7.0
    container_name: adaptive_db_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-adaptive_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================
  # Optional Frontend Dev Server (npm included)
  # Start with: docker compose --profile frontend up frontend-dev
  # ==============================================
  frontend-dev:
    image: node:20-bullseye
    container_name: adaptive_db_frontend
    restart: unless-stopped
    profiles: ["frontend"]
    working_dir: /workspace/dashboard/frontend
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/dashboard/frontend/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

  # ==============================================
  # Optional Load Testing Runner (k6 included)
  # Start with: docker compose --profile loadtest run --rm k6
  # ==============================================
  k6:
    image: grafana/k6:0.53.0
    container_name: adaptive_db_k6
    profiles: ["loadtest"]
    working_dir: /workspace
    volumes:
      - .:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BASE_URL: ${LOAD_TEST_BASE_URL:-http://host.docker.internal:8080}
    entrypoint: ["k6"]
    command: ["run", "/workspace/load_test.js"]

  # ==============================================
  # Data Stream API (from course resources)
  # Uncomment when ready to use
  # ==============================================
  # data-stream:
  #   build:
  #     context: ./data-stream
  #   container_name: adaptive_db_stream
  #   ports:
  #     - "8000:8000"

volumes:
  mysql_data:
  mongo_data:
  frontend_node_modules:
