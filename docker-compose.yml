services:
  # ==============================================
  # MySQL Database
  # ==============================================
  mysql:
    image: mysql:8.0
    container_name: adaptive_db_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-adaptive_db}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================
  # MongoDB Database
  # ==============================================
  mongodb:
    image: mongo:7.0
    container_name: adaptive_db_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-adaptive_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================
  # Backend + Freshly-built Frontend (single command)
  # ==============================================
  app:
    build: .
    container_name: adaptive_db_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-adaptive_db}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ''
      MONGO_PASSWORD: ''
      MONGO_DATABASE: ${MONGO_DATABASE:-adaptive_db}
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ==============================================
  # Optional Load Testing Runner (k6 included)
  # Start with: docker compose --profile loadtest run --rm k6
  # ==============================================
  k6:
    image: grafana/k6:0.53.0
    container_name: adaptive_db_k6
    profiles: ["loadtest"]
    working_dir: /workspace
    volumes:
      - .:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BASE_URL: ${LOAD_TEST_BASE_URL:-http://app:8080}
    entrypoint: ["k6"]
    command: ["run", "/workspace/benchmarks/load_test.js"]

  # ==============================================
  # Data Stream API (from course resources)
  # Uncomment when ready to use
  # ==============================================
  # data-stream:
  #   build:
  #     context: ./data-stream
  #   container_name: adaptive_db_stream
  #   ports:
  #     - "8000:8000"

volumes:
  mysql_data:
  mongo_data:
